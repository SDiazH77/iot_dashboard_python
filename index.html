</head>

<body>
    <h1>Dashboard IoT con Python y Github</h1>
    <h2>Temperatura: <span id="temperatura">--</span> °C</h2>
    <h2>Humedad: <span id="humedad">--</span> %</h2>
    <p>Fecha: <span id="fecha">--</span></p>
    <script>
        fetch('datos.json')
            .then(response => response.json())
            .then(datos => {
                document.getElementById("temperatura").textContent = datos.temperatura;
                document.getElementById("humedad").textContent = datos.humedad;
                document.getElementById("fecha").textContent = datos.fecha_hora;
            })
    </script>

</body>

</html>
